name: Generate Contributions

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 🐍 Snake (dark)
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ViquinhoDev
          outputs: dist/snake-dark.svg?palette=github-dark

      # 🟡 Pac-Man (dark)
      - name: Generate Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ViquinhoDev
          output_file: dist/pacman.svg
          background: '#0d1117'
          color: '#39d353'

      # 🚀 Deploy
      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
