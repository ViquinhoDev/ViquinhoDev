name: Generate Contributions

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      # 🔧 cria pasta antes
      - name: Create dist folder
        run: mkdir -p dist

      # 🐍 Snake (dark)
      - name: Generate Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ViquinhoDev
          outputs: dist/snake-dark.svg?palette=github-dark

      # 🟡 Pac-Man
      - name: Generate Pac-Man
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ViquinhoDev

      # 🔄 mover arquivo (corrigido)
      - name: Move Pac-Man to dist
        run: |
          FILE=$(find . -name "*pacman*.svg" | head -n 1)
          echo "Found: $FILE"
          mv "$FILE" dist/pacman.svg

      # 🚀 deploy
      - name: Deploy
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
