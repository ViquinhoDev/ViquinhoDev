name: Generate Snake

# Permissões necessárias
permissions:
  contents: write

# Executar manualmente ou uma vez por dia
on:
  schedule:
    - cron: "0 */24 * * *" # todos os dias à meia-noite UTC
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # Usar o Platane Snake Generator
      - uses: Platane/snk@v3
        with:
          github_user_name: ViquinhoDev
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Publicar na branch 'output' usando GitHub Pages Action
      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
